name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Install dependencies
        run: poetry install --with dev

      - name: Check package metadata
        run: poetry check --lock

      - name: Run tests
        run: poetry run pytest

      - name: Run lint
        run: poetry run flake8 m_c manage.py

      - name: Audit dependencies
        run: poetry run pip-audit

  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build --tag metadata-cleaner:test .

  package-smoke:
    name: Package smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install optional system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libimage-exiftool-perl

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Build package
        run: poetry build

      - name: Install wheel in clean environment
        run: |
          python -m venv /tmp/metadata-cleaner-smoke
          /tmp/metadata-cleaner-smoke/bin/python -m pip install --upgrade pip
          /tmp/metadata-cleaner-smoke/bin/python -m pip install dist/*.whl

      - name: Smoke test installed CLI
        run: |
          METADATA_CLEANER_CLI=/tmp/metadata-cleaner-smoke/bin/metadata-cleaner \
            /tmp/metadata-cleaner-smoke/bin/python .github/scripts/package_smoke.py
